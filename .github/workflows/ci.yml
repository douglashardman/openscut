name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts:
    name: ts — lint + build + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --filter './packages/*' run lint

      - name: Build
        run: pnpm -r --filter './packages/*' run build

      - name: Typecheck
        run: pnpm -r --filter './packages/*' run typecheck

      - name: Test
        run: pnpm -r --filter './packages/*' run test

  contracts:
    name: contracts — forge build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Solidity dependencies
        working-directory: contracts
        run: forge install --no-git foundry-rs/forge-std openzeppelin/openzeppelin-contracts

      - name: Build
        working-directory: contracts
        run: forge build --sizes

      - name: Test
        working-directory: contracts
        run: forge test -vvv
