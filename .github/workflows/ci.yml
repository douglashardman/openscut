name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: lint + typecheck + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --filter './packages/*' run lint

      - name: Build
        run: pnpm -r --filter './packages/*' run build

      - name: Typecheck
        run: pnpm -r --filter './packages/*' run typecheck

      - name: Test
        run: pnpm -r --filter './packages/*' run test
